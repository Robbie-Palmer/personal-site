name: ML Pipelines CI

on:
  pull_request:
    paths:
      - "ml-pipelines/**"
      - "packages/recipe-parsing/**"
      - "packages/recipe-domain/**"
      - "patches/@cooklang__cooklang@*.patch"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ml-pipelines-ci.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dvc-validate-and-report:
    runs-on: ubuntu-latest
    environment:
      name: production-ci
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
    strategy:
      matrix:
        pipeline:
          - recipe-parsing
          - recipe-dataset
    defaults:
      run:
        working-directory: ml-pipelines/${{ matrix.pipeline }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install DVC
        run: pip install 'dvc[s3]'

      - name: Validate DVC remote
        run: dvc pull

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        if: matrix.pipeline == 'recipe-parsing'
        with:
          experimental: true

      - name: Get pnpm store directory
        if: matrix.pipeline == 'recipe-parsing'
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: matrix.pipeline == 'recipe-parsing'
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        if: matrix.pipeline == 'recipe-parsing'
        run: mise run //:install

      - name: Check shared parsing package
        if: matrix.pipeline == 'recipe-parsing'
        run: mise run //packages/recipe-parsing:check

      - name: Run tests
        if: matrix.pipeline == 'recipe-parsing'
        run: mise :test

      - name: Comment metrics on PR
        run: |
          # Fetch main to ensure we have a reference for diff
          git fetch origin main:refs/remotes/origin/main || echo "Failed to fetch origin/main"
          
          echo "Debug: Running dvc metrics diff..."
          DIFF=$(dvc metrics diff --md origin/main || echo "DVC diff failed")
          echo "Debug: DIFF Content:"
          echo "$DIFF"
          
          DATA_ROWS=$(echo "$DIFF" | grep -c '^|' || true)
          echo "Debug: Data rows count: $DATA_ROWS"
          
          if [ "$DATA_ROWS" -gt 2 ]; then
             BODY="## ${{ matrix.pipeline }} metrics diff"$'\n\n'"$DIFF"
          else
             echo "Debug: Running dvc metrics show..."
             # Note: --all is not valid for 'show', removing it.
             SHOW=$(dvc metrics show --md || echo "DVC show failed")
             echo "Debug: SHOW Content:"
             echo "$SHOW"
             BODY="## ${{ matrix.pipeline }} metrics"$'\n\n'"$SHOW"
          fi
          
          MARKER="<!-- dvc-metrics:${{ matrix.pipeline }} -->"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          UPDATED_AT=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY="$MARKER"$'\n'"$BODY"$'\n\n'\
          "_Updated by [ML Pipelines CI run ${GITHUB_RUN_NUMBER}]($RUN_URL) at $UPDATED_AT._"

          # Update only this pipeline's comment so matrix jobs cannot overwrite
          # one another.
          BODY_FILE=$(mktemp)
          echo "$BODY" > "$BODY_FILE"

          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | tail -n 1)
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/$COMMENT_ID" \
              -F "body=@$BODY_FILE" > /dev/null
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file "$BODY_FILE"
          fi

          rm -f "$BODY_FILE"
