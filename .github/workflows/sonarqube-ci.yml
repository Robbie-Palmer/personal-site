name: SonarQube CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonarqube-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Analysis and coverage
    runs-on: ubuntu-latest
    environment:
      name: production-ci
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise run //:install

      - name: Generate LCOV coverage reports
        run: mise run //:sonar:coverage

      # Repository secrets are unavailable to fork PRs. Keep running the tests
      # above, but never expose the Sonar token to untrusted contributor code.
      # Everywhere else, fail visibly instead of silently skipping analysis.
      - name: Detect SonarQube upload availability
        id: sonar-upload
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ "$IS_FORK" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SonarQube upload skipped because secrets are unavailable to fork pull requests"
          else
            echo "::error::SONAR_TOKEN is required for SonarQube Cloud analysis"
            exit 1
          fi

      - name: Scan with SonarQube Cloud
        if: steps.sonar-upload.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
