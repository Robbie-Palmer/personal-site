name: OpenSSF Scorecard

on:
  # Re-evaluate when branch protection settings change
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Weekly scan every Tuesday at 00:00 UTC (Trivy owns Monday)
    - cron: "0 0 * * 2"
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Upload SARIF to code scanning
      id-token: write # Publish results (OIDC signing, needed by scorecard.dev)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        if: always()
        with:
          sarif_file: results.sarif
          category: scorecard
