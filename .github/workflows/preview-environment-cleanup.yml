name: Preview Environment Cleanup

on:
  # Gated to same-repo PRs, so pull_request supplies the secrets needed to
  # delete the preview resources.
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number whose preview resources should be deleted
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  cleanup:
    # Always run on close (delete steps are continue-on-error and no-op when no
    # preview resources exist)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview-recipe-api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Delete preview Worker
        continue-on-error: true
        run: mise run //workers/recipe-api:preview:delete
        env:
          PREVIEW_WORKER_NAME: recipe-api-pr-${{ github.event.pull_request.number || inputs.pr_number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview ingestion Worker and Workflow
        continue-on-error: true
        run: mise run //workers/recipe-ingest:preview:delete
        env:
          PREVIEW_INGEST_NAME: recipe-ingest-pr-${{ github.event.pull_request.number || inputs.pr_number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview artifact bucket
        continue-on-error: true
        run: mise run //workers/recipe-ingest:preview:bucket:delete
        env:
          PREVIEW_BUCKET_NAME: recipe-artifacts-pr-${{ github.event.pull_request.number || inputs.pr_number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete Neon preview branch
        continue-on-error: true
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview-pr-${{ github.event.pull_request.number || inputs.pr_number }}
