name: Trivy Security Scan

on:
  pull_request:
    paths:
      - "infra/**"
      - "**/pnpm-lock.yaml"
      - "**/package.json"
      - ".github/workflows/trivy-security.yml"
  schedule:
    # Weekly scan every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  security-events: write # Required to upload SARIF results

jobs:
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "./infra"
          format: "sarif"
          output: "trivy-iac-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # Fail CI on findings
          timeout: "10m"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Upload results even if scan fails
        with:
          sarif_file: "trivy-iac-results.sarif"
          category: "trivy-iac"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-deps-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          timeout: "10m"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-deps-results.sarif"
          category: "trivy-dependencies"
