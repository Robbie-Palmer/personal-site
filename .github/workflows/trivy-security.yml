name: Trivy Security Scan

on:
  pull_request:
    paths:
      # IaC / config-shaped paths (keep broad enough that new roots are not
      # silently skipped on PRs; weekly schedule is the full-tree backstop)
      - "infra/**"
      - "infra-bootstrap/**"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/docker-compose*.yml"
      - "**/docker-compose*.yaml"
      - "**/compose.yml"
      - "**/compose.yaml"
      - "**/Chart.yaml"
      - "**/values.yml"
      - "**/values.yaml"
      - "**/kubernetes/**"
      - "**/k8s/**"
      - "**/helm/**"
      # Dependencies
      - "**/pnpm-lock.yaml"
      - "**/package.json"
      - ".github/workflows/trivy-security.yml"
  schedule:
    # Weekly scan every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Whole workspace: never pin to a single Terraform root.
      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac-results.sarif"
          severity: "CRITICAL,HIGH"
          timeout: "10m"
          skip-dirs: "node_modules,.pnpm-store,.terraform"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        if: always()
        with:
          sarif_file: "trivy-iac-results.sarif"
          category: "trivy-iac"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-deps-results.sarif"
          severity: "CRITICAL,HIGH"
          timeout: "10m"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        if: always()
        with:
          sarif_file: "trivy-deps-results.sarif"
          category: "trivy-dependencies"
