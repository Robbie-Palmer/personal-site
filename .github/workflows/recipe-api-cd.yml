name: Recipe API CD

on:
  push:
    branches:
      - main
    paths:
      - "workers/recipe-api/**"
      - "packages/recipe-db/**"
      - ".github/workflows/recipe-api-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recipe-api-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-recipe-api
    defaults:
      run:
        working-directory: workers/recipe-api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise run //workers/recipe-api:install

      - name: Migrate database
        run: mise run //workers/recipe-api:db:migrate
        env:
          # This secret is the direct Neon URL; the Worker uses Hyperdrive for
          # pooled application traffic after deployment.
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Create Worker secrets file
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || vars.GCP_OAUTH_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || secrets.GCP_OAUTH_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID_GITHUB }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET_GITHUB }}
        run: |
          set -euo pipefail
          : "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}"
          : "${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID or GCP_OAUTH_CLIENT_ID is required}"
          : "${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET or GCP_OAUTH_CLIENT_SECRET is required}"
          : "${GITHUB_CLIENT_ID:?OAUTH_CLIENT_ID_GITHUB is required}"
          : "${GITHUB_CLIENT_SECRET:?OAUTH_CLIENT_SECRET_GITHUB is required}"

          SECRETS_FILE="$RUNNER_TEMP/recipe-api-worker-secrets.json"
          jq -n \
            --arg better_auth_secret "$BETTER_AUTH_SECRET" \
            --arg google_client_id "$GOOGLE_CLIENT_ID" \
            --arg google_client_secret "$GOOGLE_CLIENT_SECRET" \
            --arg github_client_id "$GITHUB_CLIENT_ID" \
            --arg github_client_secret "$GITHUB_CLIENT_SECRET" \
            '{
              BETTER_AUTH_SECRET: $better_auth_secret,
              GOOGLE_CLIENT_ID: $google_client_id,
              GOOGLE_CLIENT_SECRET: $google_client_secret,
              GITHUB_CLIENT_ID: $github_client_id,
              GITHUB_CLIENT_SECRET: $github_client_secret
            }' \
            > "$SECRETS_FILE"
          echo "WORKER_SECRETS_FILE=$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: Deploy worker
        run: mise x -- pnpm exec wrangler deploy --secrets-file "$WORKER_SECRETS_FILE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
