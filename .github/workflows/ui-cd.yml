name: UI CD

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - "functions/**"
      - "packages/**"
      - ".mise.toml"
      - ".github/workflows/ui-cd.yml"
      - "package.json"
  pull_request:
    paths:
      - "ui/**"
      - "functions/**"
      - "packages/**"
      - ".mise.toml"
      - ".github/workflows/ui-cd.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_CF_IMAGES_ACCOUNT_HASH: ${{ secrets.CF_IMAGES_ACCOUNT_HASH }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Install dependencies
        run: mise run //:install

      - name: Build
        run: mise run //ui:build

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          OUTPUT=$(mise run //ui:deploy 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo "https://[^ ]+" | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${process.env.DEPLOY_URL}`
            });
