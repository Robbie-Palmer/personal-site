name: Recipe Ingest CD

on:
  push:
    branches:
      - main
    paths:
      - "workers/recipe-ingest/**"
      - "packages/recipe-parsing/**"
      - "packages/recipe-db/**"
      - "packages/recipe-domain/**"
      - "patches/**"
      - ".github/workflows/recipe-ingest-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production-recipe-ingest
    defaults:
      run:
        working-directory: workers/recipe-ingest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise run //workers/recipe-ingest:install

      - name: Create Worker secrets file
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          : "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}"

          SECRETS_FILE="$RUNNER_TEMP/recipe-ingest-worker-secrets.json"
          jq -n \
            --arg openrouter_api_key "$OPENROUTER_API_KEY" \
            '{ OPENROUTER_API_KEY: $openrouter_api_key }' \
            > "$SECRETS_FILE"
          echo "WORKER_SECRETS_FILE=$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: Deploy worker
        run: mise x -- pnpm exec wrangler deploy --secrets-file "$WORKER_SECRETS_FILE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
