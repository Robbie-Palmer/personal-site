name: Recipe API CI

on:
  pull_request:
    paths:
      - "workers/recipe-api/**"
      - ".github/workflows/recipe-api-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/recipe-api
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter recipe-api...

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  preview:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: cloudflare-production
    defaults:
      run:
        working-directory: workers/recipe-api
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter recipe-api...

      - name: Deploy preview worker
        id: deploy
        run: |
          WORKER_NAME="recipe-api-pr-${{ github.event.pull_request.number }}"
          DEPLOY_OUTPUT=$(npx wrangler deploy --name "$WORKER_NAME" 2>&1)
          echo "$DEPLOY_OUTPUT"
          PUBLISHED_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "url=$PUBLISHED_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set DATABASE_URL secret
        run: echo "$DATABASE_URL" | npx wrangler secret put DATABASE_URL --name "${{ steps.deploy.outputs.worker_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Recipe API Preview

            **URL:** ${{ steps.deploy.outputs.url }}
            **Worker:** \`${{ steps.deploy.outputs.worker_name }}\`

            Test endpoints:
            - [\`/health\`](${{ steps.deploy.outputs.url }}/health)
            - [\`/recipes\`](${{ steps.deploy.outputs.url }}/recipes)`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Recipe API Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
