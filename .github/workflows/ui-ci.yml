name: UI CI

on:
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ui-ci.yml"
      - ".mise.toml"
      - ".remarkrc.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      # Cache the pnpm content-addressable store so installs restore packages
      # from disk instead of re-downloading them on every run.
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: mise run //:install

      - name: Lint MDX files
        run: mise run //:lint:mdx:check

      - name: Run checks
        run: mise run //ui:check

      # Persist Next.js's incremental build cache (compiled modules, SWC output)
      # so the Build step reuses unchanged work. The key is invalidated on lock
      # or source changes; restore-keys still seeds the cache from the closest
      # previous build so a content edit doesn't force a cold compile.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ui/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('ui/app/**', 'ui/components/**', 'ui/content/**', 'ui/lib/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: |
          mise run //ui:build
        env:
          NEXT_PUBLIC_CF_IMAGES_ACCOUNT_HASH: ${{ secrets.CF_IMAGES_ACCOUNT_HASH }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      # Depends on build output - mise caches the build
      - name: Run integration tests
        run: mise run //ui:test:integration
