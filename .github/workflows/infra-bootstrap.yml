name: Bootstrap Infrastructure

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the saved bootstrap Terraform plan
        required: true
        default: false
        type: boolean

concurrency:
  group: infra-bootstrap
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production-infra-bootstrap
    defaults:
      run:
        working-directory: infra-bootstrap
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Create empty .env for mise
        run: touch .env

      - name: Authenticate to Google Cloud via Workload Identity
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Remove stale Terraform plan file
        run: rm -f .planfile

      - name: Terraform Plan
        run: mise run //infra-bootstrap:plan
        env:
          DOPPLER_BOOTSTRAP_INFRA_CONFIG: prd_bootstrap_infra
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform Apply
        if: ${{ inputs.apply && success() && hashFiles('infra-bootstrap/.planfile') != '' }}
        run: mise run //infra-bootstrap:apply
        env:
          DOPPLER_BOOTSTRAP_INFRA_CONFIG: prd_bootstrap_infra
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Remove Google credentials file
        if: ${{ always() }}
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          fi
