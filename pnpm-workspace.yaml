packages:
  - 'ui'
  - 'packages/*'
  - 'workers/*'
  - 'ml-pipelines/recipe-parsing'
  - 'ml-pipelines/recipe-parsing/tools/viz'

# pnpm 10 already skipped these dependency lifecycle scripts. pnpm 11 requires
# the policy to be explicit; keep installs reproducible without expanding the
# set of third-party code allowed to execute during dependency installation.
allowBuilds:
  core-js: false
  esbuild: false
  puppeteer: false
  sharp: false
  workerd: false

# Dedupe postcss onto the patched 8.5.x line. Next pulls in 8.4.31, which is
# affected by GHSA-qx2v-qp2m-jg93 (XSS via unescaped </style> in stringify);
# 8.5.x is already in the tree via @tailwindcss/postcss and is API-compatible.
#
# Force js-yaml >=4.2.0 to fix GHSA-h67p-54hq-rp68 (quadratic-complexity DoS in
# merge-key handling). gray-matter@4.0.3 pins js-yaml ^3.13.1, which has no
# patched 3.x release, so the override is paired with a patch (see
# patchedDependencies) that swaps gray-matter's removed safeLoad/safeDump calls
# for js-yaml 5.x's load/dump. The patch explicitly enables only YAML merge
# keys, preserving gray-matter's historical front-matter behaviour while
# retaining v5's safer CORE_SCHEMA defaults for everything else.
#
# Patch @cooklang/cooklang's wasm-bindgen glue to instantiate the WebAssembly
# module itself when the runtime resolves the .wasm import to a
# WebAssembly.Module (Cloudflare workerd) instead of instantiated exports
# (vite/webpack/node). Without it the parser crashes at startup in Workers.
#
# Force esbuild >=0.25.0 under the deprecated @esbuild-kit subtree to fix
# GHSA-67mh-4wv8-2f99 (dev-server CORS source leak). drizzle-kit (dev-only)
# still drags in @esbuild-kit/esm-loader -> @esbuild-kit/core-utils -> esbuild
# 0.18.x even on its latest release; it already uses esbuild 0.25 directly, so
# the loader's transform/build calls are API-compatible with the bump. Scoped
# so other consumers (e.g. vite's esbuild 0.28) are untouched.
#
# Lighthouse 13.4.0 still requests Sentry 9, which pulls in the vulnerable
# @opentelemetry/core 1.30.1 (GHSA-8988-4f7v-96qf). Sentry 10 retains the APIs
# Lighthouse uses for optional error reporting and has moved to the patched
# OpenTelemetry 2.x line. Scope the major-version override to Lighthouse.
overrides:
  '@esbuild-kit/core-utils>esbuild': '^0.28.0'
  'lighthouse>@sentry/node': '^10.66.0'
  js-yaml: '^5.0.0'
  postcss: '^8.5.10'

patchedDependencies:
  '@cooklang/cooklang@0.18.7': patches/@cooklang__cooklang@0.18.7.patch
  gray-matter@4.0.3: patches/gray-matter@4.0.3.patch
