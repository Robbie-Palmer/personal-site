sonar.organization=robbie-palmer
sonar.projectKey=Robbie-Palmer_personal-site
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Keep test code out of production-code metrics and let SonarQube apply its
# test-specific analysis rules. Test inclusions are also source exclusions.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**/*

# Vendored design prototypes exported from Claude Design and their generated
# standalone build are not part of the maintained application source. Binary
# public assets are excluded so language sensors do not try to decode them as UTF-8.
sonar.exclusions=ui/content/projects/*/designs/**,ui/public/recipe-site-design/standalone.html,**/coverage/**,ui/public/**/*.png

# Coverage is an advisory trend, not a quality-gate condition (ADR 045).
sonar.javascript.lcov.reportPaths=ui/coverage/lcov.info,packages/recipe-parsing/coverage/lcov.info,ml-pipelines/recipe-parsing/coverage/lcov.info,workers/recipe-api/coverage/lcov.info,workers/recipe-ingest/coverage/lcov.info
