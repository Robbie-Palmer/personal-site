name = "recipe-api"
main = "src/index.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

# Export Worker logs to PostHog via OTLP. The "posthog-logs" destination
# (endpoint + auth header) is configured in the Cloudflare dashboard, not here.
[observability]
enabled = true

[observability.logs]
enabled = true
destinations = ["posthog-logs"]

[vars]
# Browser-facing URL used to build OAuth callbacks in production.
# The local dev script overrides this with http://localhost:3000.
BETTER_AUTH_URL = "https://robbiepalmer.me"

[secrets]
required = [
  "BETTER_AUTH_SECRET",
  "GOOGLE_CLIENT_ID",
  "GOOGLE_CLIENT_SECRET",
  "GITHUB_CLIENT_ID",
  "GITHUB_CLIENT_SECRET",
]

# Daily sweep of stale rate-limit counters (src/index.ts scheduled handler).
[triggers]
crons = ["0 3 * * *"]

# Hyperdrive connection pooling to Neon.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "981c36e3ec8a48fda9a5de338e8d8257"
# Local dev: set CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE in your shell environment.
# Do NOT put the connection string in this file — it gets committed to git.

# Recipe photo imports (ADR 049): source image uploads and the cross-script
# binding to the recipe-ingest Workflow.
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "recipe-artifacts"

[[workflows]]
name = "recipe-ingest"
binding = "RECIPE_INGEST_WORKFLOW"
class_name = "RecipeIngestWorkflow"
script_name = "recipe-ingest"
