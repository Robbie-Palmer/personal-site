[tasks.install]
description = "Install recipe API dependencies"
run = "pnpm install --frozen-lockfile --filter recipe-api..."

[tasks.typecheck]
description = "Typecheck the recipe API"
depends = ["install"]
run = "pnpm typecheck"

[tasks.test]
description = "Run recipe API tests"
depends = ["install"]
run = "pnpm test"

[tasks."test:integration"]
description = "Run recipe API integration tests against disposable PostgreSQL"
depends = ["install"]
run = "pnpm test:integration"

[tasks.check]
description = "Run all recipe API checks"
depends = ["typecheck", "test", "db:check"]

[tasks."db:check"]
description = "Validate the Drizzle migration history and schema snapshot"
depends = ["install"]
run = "pnpm db:check"

[tasks."db:generate"]
description = "Generate a Drizzle migration from schema changes"
depends = ["install"]
run = "pnpm db:generate"

[tasks."db:migrate"]
description = "Apply committed Drizzle migrations to DATABASE_URL"
depends = ["install"]
run = "pnpm db:migrate"

[tasks."db:seed:preview"]
description = "Seed deterministic preview users and data"
depends = ["install"]
run = "pnpm preview:seed"

[tasks."db:studio"]
description = "Open Drizzle Studio for DATABASE_URL"
depends = ["install"]
run = "pnpm db:studio"

[tasks."preview:deploy"]
description = "Deploy an isolated preview Worker"
depends = ["install"]
run = """
#!/usr/bin/env bash
set -euo pipefail

: "${PREVIEW_WORKER_NAME:?PREVIEW_WORKER_NAME is required}"
: "${PREVIEW_INGEST_NAME:?PREVIEW_INGEST_NAME is required}"
: "${PREVIEW_SITE_URL:?PREVIEW_SITE_URL is required}"
: "${CF_ACCESS_TEAM_DOMAIN:?CF_ACCESS_TEAM_DOMAIN is required}"
: "${CF_ACCESS_AUD:?CF_ACCESS_AUD is required}"
: "${PREVIEW_SECRETS_FILE:?PREVIEW_SECRETS_FILE is required}"

PREVIEW_CONFIG=$(mktemp ./wrangler.preview.generated.XXXXXX.toml)
trap 'rm -f "$PREVIEW_CONFIG"' EXIT
sed \
  -e "s/__PREVIEW_INGEST_NAME__/$PREVIEW_INGEST_NAME/g" \
  wrangler.preview.toml > "$PREVIEW_CONFIG"

pnpm exec wrangler deploy \
  --config "$PREVIEW_CONFIG" \
  --name "$PREVIEW_WORKER_NAME" \
  --var DEPLOYMENT_ENV:preview \
  --var BETTER_AUTH_URL:"$PREVIEW_SITE_URL" \
  --var CF_ACCESS_TEAM_DOMAIN:"$CF_ACCESS_TEAM_DOMAIN" \
  --var CF_ACCESS_AUD:"$CF_ACCESS_AUD" \
  --secrets-file "$PREVIEW_SECRETS_FILE"
"""

[tasks."preview:delete"]
description = "Delete an isolated preview Worker"
depends = ["install"]
run = """
#!/usr/bin/env bash
set -euo pipefail
: "${PREVIEW_WORKER_NAME:?PREVIEW_WORKER_NAME is required}"
pnpm exec wrangler delete --name "$PREVIEW_WORKER_NAME" --force
"""
