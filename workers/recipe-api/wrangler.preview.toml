name = "recipe-api-preview"
main = "src/index.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Retain preview logs in Cloudflare Workers Logs and export them through the
# same account-level OTLP destination as production.
[observability]
enabled = true

[observability.logs]
enabled = true
destinations = ["posthog-logs"]

[secrets]
required = [
  "DATABASE_URL",
  "BETTER_AUTH_SECRET",
  "PREVIEW_AUTH_PASSWORD",
]

# The preview workflow injects the isolated Neon branch's pooled DATABASE_URL
# as a Worker secret instead of binding production Hyperdrive.

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "recipe-artifacts-preview"

[[workflows]]
name = "__PREVIEW_INGEST_NAME__"
binding = "RECIPE_INGEST_WORKFLOW"
class_name = "RecipeIngestWorkflow"
script_name = "__PREVIEW_INGEST_NAME__"
