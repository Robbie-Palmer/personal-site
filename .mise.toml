experimental_monorepo_root = true

[monorepo]
config_roots = [
    "ui",
    "infra",
    "infra-bootstrap",
    "backups",
    "ml-pipelines",
    "ml-pipelines/recipe-dataset",
    "ml-pipelines/recipe-parsing",
    "packages/recipe-db",
    "packages/recipe-parsing",
    "workers/recipe-api",
    "workers/recipe-ingest",
]

[settings]
color = true
verbose = false

[tools]
node = "lts"
"github:pnpm/pnpm" = "11.15.0"
terraform = "1.15.8"
tflint = "0.64.0"
actionlint = "1.7.12"
zizmor = "1.26.1"
gitleaks = "8.30.1"
typos = "1.48.0"

[env]
MISE_EXPERIMENTAL = "1"

# Root-level tasks for repo-wide tooling
[tasks.lint]
description = "Lint all files across the entire repo"
depends = ["//:lint:markdown", "//:lint:mdx", "//:lint:yaml", "//:lint:typos", "//:lint:knip", "//:lint:actions", "//ui:lint", "//infra:lint", "//infra:lint:tflint", "//infra-bootstrap:lint", "//infra-bootstrap:lint:tflint"]

[tasks."lint:markdown"]
description = "Lint and fix Markdown files (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  pnpm exec markdownlint --fix "**/*.md" --ignore node_modules --ignore '**/node_modules' --ignore .terraform --ignore '**/.terraform'
else
  pnpm exec markdownlint --fix --ignore node_modules --ignore '**/node_modules' --ignore .terraform --ignore '**/.terraform' "$@"
fi
"""

[tasks."lint:markdown:check"]
description = "Check Markdown files without fixing (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  pnpm exec markdownlint "**/*.md" --ignore node_modules --ignore '**/node_modules' --ignore .terraform --ignore '**/.terraform'
else
  pnpm exec markdownlint --ignore node_modules --ignore '**/node_modules' --ignore .terraform --ignore '**/.terraform' "$@"
fi
"""

[tasks."lint:mdx"]
description = "Lint and fix MDX files (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  pnpm exec remark "**/*.mdx" --output --frail --quiet
else
  pnpm exec remark "$@" --output --frail --quiet
fi
"""

[tasks."lint:mdx:check"]
description = "Check MDX files without fixing (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  pnpm exec remark "**/*.mdx" --frail --quiet
else
  pnpm exec remark "$@" --frail --quiet
fi
"""

[tasks."lint:yaml"]
description = "Lint YAML files (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  pnpm exec yamllint "**/*.{yml,yaml}" --ignore '**/node_modules/**'
else
  pnpm exec yamllint --ignore '**/node_modules/**' "$@"
fi
"""

[tasks."lint:knip"]
description = "Detect unused files, dependencies, and exports across the monorepo with Knip"
run = "pnpm exec knip"
depends = ["//:install"]

[tasks."lint:typos"]
description = "Check spelling across the repo with typos"
run = "typos"

[tasks."lint:typos:fix"]
description = "Fix typos across the repo with typos"
run = "typos --write-changes"

[tasks."lint:actions"]
description = "Lint GitHub Actions workflows with actionlint"
run = "actionlint"

[tasks."security:actions"]
description = "Audit GitHub Actions workflows for security issues with zizmor"
run = "zizmor ."

[tasks."security:secrets"]
description = "Scan staged changes for secrets with gitleaks"
run = "gitleaks git --pre-commit --staged --redact --verbose"

[tasks."security:secrets:history"]
description = "Scan the full git history for secrets with gitleaks"
run = "gitleaks git --redact"

[tasks.pre-commit]
description = "Run pre-commit checks (called by Husky)"
run = ["pnpm lint-staged", "mise run //:security:secrets"]
depends = ["//:install"]

[tasks.dev]
description = "Start full local dev: Next.js (with auth rewrite) + recipe-api Worker"
depends = ["//:install"]
run = """
#!/usr/bin/env bash
set -e

if [ "${PERSONAL_SITE_DOPPLER_WRAPPED:-}" != "1" ]; then
  if ! command -v doppler >/dev/null 2>&1; then
    echo "Cannot start local development: doppler is required."
    echo "Install the Doppler CLI, then run 'mise run //:dev' again."
    exit 1
  fi

  export PERSONAL_SITE_DOPPLER_WRAPPED=1
  exec doppler run \
    --project "${DOPPLER_PROJECT:-personal-site}" \
    --config "${DOPPLER_PAGES_ENV_CONFIG:-dev_pages_env}" \
    -- doppler run \
      --project "${DOPPLER_PROJECT:-personal-site}" \
      --config "${DOPPLER_RECIPE_API_CONFIG:-dev_recipe_api}" \
      --preserve-env=NEXT_PUBLIC_CF_IMAGES_ACCOUNT_HASH,CF_IMAGES_ACCOUNT_HASH,POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_KEY,POSTHOG_HOST,NEXT_PUBLIC_POSTHOG_HOST,POSTHOG_API_HOST,POSTHOG_ASSETS_HOST,RECIPE_API_URL,RECIPE_API_PREVIEW_ORIGIN_TEMPLATE,CF_PAGES_HOST \
      -- "$0" "$@"
fi

if ! command -v lsof >/dev/null 2>&1; then
  echo "Cannot start local development: lsof is required."
  echo "Install it with your package manager, then run 'mise run //:dev' again."
  exit 1
fi

check_port() {
  local port="$1"
  local service="$2"
  local listeners

  listeners=$(lsof -nP -iTCP:"$port" -sTCP:LISTEN 2>/dev/null || true)
  if [ -n "$listeners" ]; then
    echo "Cannot start $service: port $port is already in use."
    echo "$listeners"
    echo "Stop that process, then run 'mise run //:dev' again."
    exit 1
  fi
}

check_port 8787 "recipe-api Worker"
check_port 3000 "Next.js"

# Wrangler needs this env var to emulate the Hyperdrive binding locally.
# Read DATABASE_URL from Doppler if not already set.
if [ -z "$CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE" ]; then
  if [ -n "${DATABASE_URL:-}" ]; then
    export CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE="$DATABASE_URL"
  fi
fi

NEXT_PID=""
WORKER_PID=""
CLEANED_UP=0

terminate_tree() {
  local parent_pid="$1"
  local child_pid

  while read -r child_pid; do
    if [ -n "$child_pid" ]; then
      terminate_tree "$child_pid"
    fi
  done < <(pgrep -P "$parent_pid" 2>/dev/null || true)

  kill -TERM "$parent_pid" 2>/dev/null || true
}

cleanup() {
  if [ "$CLEANED_UP" -eq 1 ]; then
    return
  fi
  CLEANED_UP=1
  trap - EXIT INT TERM

  echo ""
  echo "Shutting down..."

  if [ -n "$NEXT_PID" ]; then
    terminate_tree "$NEXT_PID"
  fi
  if [ -n "$WORKER_PID" ]; then
    terminate_tree "$WORKER_PID"
  fi

  wait "$NEXT_PID" "$WORKER_PID" 2>/dev/null || true
}
trap cleanup EXIT
trap 'cleanup; exit 0' INT TERM

echo "Starting recipe-api Worker on :8787..."
pnpm --filter recipe-api dev --port 8787 &
WORKER_PID=$!

echo "Starting Next.js dev server on :3000..."
echo "Open http://localhost:3000 to test"
pnpm --filter ui dev --port 3000 &
NEXT_PID=$!

# Give both commands time to fail fast before entering the monitoring loop.
sleep 2

if ! kill -0 "$WORKER_PID" 2>/dev/null; then
  echo "recipe-api Worker failed to start."
  cleanup
  exit 1
fi

if ! kill -0 "$NEXT_PID" 2>/dev/null; then
  echo "Next.js failed to start."
  cleanup
  exit 1
fi

# Poll for the first exit instead of using `wait -n`, which requires Bash 4.3.
while kill -0 "$WORKER_PID" 2>/dev/null && kill -0 "$NEXT_PID" 2>/dev/null; do
  sleep 1
done

set +e
if ! kill -0 "$WORKER_PID" 2>/dev/null; then
  wait "$WORKER_PID"
  STATUS=$?
else
  wait "$NEXT_PID"
  STATUS=$?
fi
set -e

cleanup
exit "$STATUS"
"""

[tasks.install]
description = "Install all dependencies (root and workspaces)"
run = "pnpm install"

[tasks."sonar:coverage"]
description = "Generate all LCOV reports imported by SonarQube Cloud"
depends = [
    "//ui:test:coverage",
    "//packages/recipe-parsing:test:coverage",
    "//ml-pipelines/recipe-parsing:test:coverage",
    "//workers/recipe-api:test:coverage",
    "//workers/recipe-ingest:test:coverage",
]
