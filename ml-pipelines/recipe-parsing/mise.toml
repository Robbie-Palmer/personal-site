[tasks.test]
description = "Run tests for recipe-parsing"
run = "pnpm test"

[tasks."test:coverage"]
description = "Run recipe-parsing pipeline tests with LCOV coverage"
depends = ["//:install"]
run = "pnpm test:coverage"

[tasks.dvc]
description = "Run a DVC command with credentials from Doppler (e.g. mise run //ml-pipelines/recipe-parsing:dvc -- status)"
run = "bash ../scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc"

[tasks.pull]
description = "Pull recipe-parsing data and cached stage outputs from R2"
run = "bash ../scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc pull"

[tasks.push]
description = "Push the recipe-parsing DVC cache to its R2 prefix"
run = "bash ../scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc push"

[tasks.repro]
description = "Reproduce the recipe-parsing pipeline (LLM stages need OPENROUTER_API_KEY, injected from Doppler)"
run = "bash ../scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc repro"

[tasks.metrics]
description = "Show recipe-parsing metrics, or diff them against a revision"
run = "bash ../scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc metrics"
