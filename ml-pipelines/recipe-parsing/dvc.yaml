stages:
  prepare:
    cmd: pnpm exec tsx src/stages/prepare.ts
    deps:
      - data/ground-truth.json
      - data/recipe-images
      - src/stages/prepare.ts
      - src/schemas/ground-truth.ts
      - src/lib/io.ts
    outs:
      - outputs/prepared.json
      - outputs/image-entries.json

  dataset_stats:
    cmd: pnpm exec tsx src/stages/dataset-stats.ts
    deps:
      - outputs/prepared.json
      - data/recipe-images
      - src/stages/dataset-stats.ts
      - src/schemas/ground-truth.ts
      - src/lib/io.ts
    metrics:
      - outputs/dataset-stats.json
    plots:
      - outputs/images-per-recipe-histogram.json:
          template: bar_horizontal_sorted
          x: recipe_count
          y: image_count
          title: Recipes by image count
          x_label: Recipes
          y_label: Images per recipe
      - outputs/cuisine-distribution.json:
          template: bar_horizontal_sorted
          x: count
          y: cuisine
          title: Cuisine distribution
          x_label: Recipes
          y_label: Cuisine
      - outputs/top-ingredients.json:
          template: bar_horizontal_sorted
          x: count
          y: ingredient
          title: Top ingredients
          x_label: Mentions
          y_label: Ingredient

  extract:
    cmd: pnpm exec tsx src/stages/extract.ts
    params:
      - extract
    deps:
      - outputs/image-entries.json
      - data/recipe-images
      - src/stages/extract.ts
      - src/lib/openrouter.ts
      - src/lib/stage-runner.ts
      - src/lib/parse-retry.ts
      - src/lib/images.ts
      - src/lib/env.ts
      - src/lib/image-key.ts
      - src/schemas/ground-truth.ts
      - src/schemas/stage-artifacts.ts
      - src/schemas/parse-failures.ts
      - src/lib/io.ts
    outs:
      - outputs/extraction-predictions.json
      - outputs/extraction-failures.json

  normalize:
    cmd: pnpm exec tsx src/stages/normalize.ts
    params:
      - normalize
    deps:
      - outputs/extraction-predictions.json
      - src/stages/normalize.ts
      - src/lib/cooklang.ts
      - src/lib/stage-runner.ts
      - src/lib/parse-retry.ts
      - src/lib/openrouter.ts
      - src/lib/env.ts
      - src/lib/image-key.ts
      - src/schemas/ground-truth.ts
      - src/schemas/stage-artifacts.ts
      - src/schemas/parse-failures.ts
      - src/lib/io.ts
    outs:
      - outputs/predictions.json
      - outputs/cooklang-recipes.json
      - outputs/normalize-failures.json

  evaluate_extraction:
    cmd: pnpm exec tsx src/stages/evaluate-extraction.ts
    deps:
      - outputs/prepared.json
      - outputs/extraction-predictions.json
      - src/stages/evaluate-extraction.ts
      - src/evaluation/metrics.ts
      - src/lib/image-key.ts
      - src/lib/cooklang.ts
      - src/lib/extraction-text.ts
      - src/schemas/ground-truth.ts
      - src/schemas/stage-artifacts.ts
      - src/lib/io.ts
    outs:
      - outputs/extraction-metrics.json
      - outputs/extraction-per-image-scores.json

  evaluate_normalization:
    cmd: pnpm exec tsx src/stages/evaluate-normalization.ts
    deps:
      - outputs/prepared.json
      - outputs/predictions.json
      - src/stages/evaluate-normalization.ts
      - src/evaluation/metrics.ts
      - src/lib/image-key.ts
      - src/schemas/ground-truth.ts
      - src/lib/io.ts
    outs:
      - outputs/normalization-metrics.json
      - outputs/normalization-per-image-scores.json

  canonicalize:
    cmd: pnpm exec tsx src/stages/canonicalize.ts
    params:
      - canonicalize
    deps:
      - outputs/predictions.json
      - data/canonical-ingredients.json
      - src/stages/canonicalize.ts
      - src/lib/ingredient-canonicalization.ts
      - src/lib/openrouter.ts
      - src/lib/stage-runner.ts
      - src/lib/env.ts
      - src/lib/io.ts
      - src/schemas/ground-truth.ts
      - src/schemas/canonical-ingredients.ts
    outs:
      - outputs/predictions-canonicalized.json
      - outputs/canonicalization-decisions.json

  evaluate:
    cmd: pnpm exec tsx src/stages/evaluate.ts
    deps:
      - outputs/prepared.json
      - outputs/predictions-canonicalized.json
      - src/stages/evaluate.ts
      - src/evaluation/metrics.ts
      - src/lib/image-key.ts
      - src/lib/io.ts
    metrics:
      - outputs/metrics.json
    plots:
      - outputs/per-entry-score-plot.json:
          template: bar_horizontal_sorted
          x: overall_score
          y: recipe_title
          title: Overall score by entry
          x_label: Overall score
          y_label: Entry
