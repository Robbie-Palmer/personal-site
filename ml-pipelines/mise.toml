[tools]
# DVC is not on the mise registry, and Homebrew's Python is externally managed,
# so uv provides it as an isolated tool.
uv = "0.11.31"

[env]
_.file = ".env"

[tasks.dvc]
description = "Run DVC in the current pipeline with credentials from Doppler (e.g. mise run //ml-pipelines:dvc -- status)"
dir = "{{cwd}}"
run = "bash {{config_root}}/scripts/doppler-pipeline-env uv tool run --from 'dvc[s3]==3.67.1' dvc"
