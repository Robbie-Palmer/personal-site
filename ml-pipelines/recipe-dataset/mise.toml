[tasks.download]
description = "Download all catalogued recipe source datasets"
run = "bash scripts/download.sh"

[tasks.prepare]
description = "Normalize downloaded recipe datasets into one JSONL corpus"
run = "node src/stages/prepare.mjs"

[tasks.stats]
description = "Compute corpus quality and source metrics"
run = "node src/stages/stats.mjs"

[tasks.repro]
description = "Reproduce the complete recipe dataset pipeline"
run = "dvc repro"

[tasks.push]
description = "Push the recipe dataset DVC cache to its R2 prefix"
run = """
#!/usr/bin/env bash
set -euo pipefail
export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-${R2_ACCESS_KEY_ID:-}}"
export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-${R2_SECRET_ACCESS_KEY:-}}"
: "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID or R2_ACCESS_KEY_ID is required}"
: "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY or R2_SECRET_ACCESS_KEY is required}"
dvc push
"""

[tasks.check]
description = "Check recipe dataset pipeline scripts"
run = "bash -n scripts/download.sh && node --check src/stages/prepare.mjs && node --check src/stages/stats.mjs"
