[tasks.init]
description = "Initialize Terraform"
run = "bash scripts/doppler-terraform-env terraform init"
sources = ["*.tf"]
outputs = [".terraform/**/*"]

[tasks.format]
description = "Format Terraform files (optionally pass files as args)"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  terraform fmt -recursive .
else
  terraform fmt "$@"
fi
"""

[tasks."format:check"]
description = "Check Terraform formatting without making changes"
run = """
#!/usr/bin/env bash
if [ $# -eq 0 ]; then
  terraform fmt -check -recursive .
else
  terraform fmt -check "$@"
fi
"""

[tasks.lint]
description = "Validate Terraform configuration"
depends = ["//infra:init"]
run = "terraform validate"

[tasks."lint:tflint"]
description = "Lint Terraform with TFLint (provider-agnostic correctness rules)"
run = """
#!/usr/bin/env bash
# Lints the whole root; ignores file args appended by lint-staged
tflint --format compact
"""

[tasks.precommit-lint]
description = "Validate Terraform configuration (lightweight for pre-commit)"
run = """
#!/usr/bin/env bash
# Initialize without backend for pre-commit usage, showing errors if init fails
bash scripts/doppler-terraform-env terraform init -backend=false > /dev/null || { echo "Terraform init failed" >&2; exit 1; }
bash scripts/doppler-terraform-env terraform validate
"""

[tasks.plan]
description = "Run Terraform plan"
depends = ["//infra:init"]
run = "bash scripts/doppler-terraform-env terraform plan -out .planfile"
outputs = [".planfile"]

[tasks.apply]
description = "Apply Terraform changes"
depends = ["//infra:init"]
run = "bash scripts/doppler-terraform-env terraform apply -auto-approve .planfile"

[tasks.check]
description = "Run all checks (format, lint, plan)"
depends = ["//infra:format:check", "//infra:lint", "//infra:lint:tflint", "//infra:plan"]
